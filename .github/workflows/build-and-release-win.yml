name: Build and Publish — Windows
run-name: ${{ github.actor }} is building a Windows release

on:
  push:
    branches:
      - main
      - dev

permissions:
  actions: write
  contents: write
  packages: write

jobs:
  build-for-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment-win.yml
          activate-environment: vame-desktop
          auto-activate-base: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Set version based on branch
        id: set-version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          if [[ "${{ github.ref_name }}" == "dev" ]]; then
            echo "VERSION=${BASE_VERSION}-dev.${{ github.run_number }}" >> $GITHUB_ENV
          else
            echo "VERSION=${BASE_VERSION}" >> $GITHUB_ENV
          fi
          echo "Using version: $VERSION"

      - name: Build and publish for Windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win -- --publish=always --config.extraMetadata.version=${{ env.VERSION }}

name: Test build — Linux
run-name: ${{ github.actor }} is building for Linux.

on:
  pull_request:
    branches: [main]

jobs:
  test-on-linux:
    runs-on: ubuntu-22.04

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: install necessary libs
        run: |
          sudo apt-get install build-essential clang libdbus-1-dev libgtk-3-dev \
            libnotify-dev libasound2-dev libcap-dev \
            libcups2-dev libxtst-dev \
            libxss1 libnss3-dev gcc-multilib g++-multilib curl \
            gperf bison python3-dbusmock openjdk-8-jre xvfb

      - name: install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --no-cache-dir

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build:linux -- --publish=never

      - name: Install built package
        run: |
          sudo dpkg -i dist/*.deb || sudo apt-get install -f -y

      - name: Test GUI startup
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1024x768x24" bash -c "
            vame-desktop & sleep 15 && pkill -x vame-desktop
          "

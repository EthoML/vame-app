name: Build

run-name: ${{ github.actor }} is building the VAME App wheel

on:
  push:
    branches:
      - main
      - dev
      - webapp
  pull_request:
  release:
    types: [published]

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Python wheel (bundles the built frontend)
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - uses: actions/upload-artifact@v4
        with:
          name: vame-app-wheel
          path: dist/*.whl

      - name: Publish wheel to the GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.whl

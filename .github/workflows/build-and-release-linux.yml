name: Build and Publish — Linux
run-name: ${{ github.actor }} is building a Linux release

on:
  push:
    branches:
      - main
      - dev

permissions:
  actions: write
  contents: write
  packages: write

jobs:
  build-for-linux:
    runs-on: ubuntu-22.04

    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: install necessary libs
        run: |
          sudo apt-get install build-essential clang libdbus-1-dev libgtk-3-dev \
                       libnotify-dev libasound2-dev libcap-dev \
                       libcups2-dev libxtst-dev \
                       libxss1 libnss3-dev gcc-multilib g++-multilib curl \
                       gperf bison python3-dbusmock openjdk-8-jre

      - name: Set up Conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment-linux.yml
          activate-environment: vame-desktop
          auto-activate-base: false

      - name: Install dependencies
        run: npm install

      - name: Set version based on branch
        id: set-version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          if [[ "${{ github.ref_name }}" == "dev" ]]; then
            echo "VERSION=${BASE_VERSION}-dev.${{ github.run_number }}" >> $GITHUB_ENV
          else
            echo "VERSION=${BASE_VERSION}" >> $GITHUB_ENV
          fi
          echo "Using version: $VERSION"

      - name: Build and publish for Linux(Debian)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:linux -- --publish=always --config.extraMetadata.version=${{ env.VERSION }}
